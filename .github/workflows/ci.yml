name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Check scripts
        run: bash -n scripts/build-initramfs.sh scripts/run-qemu.sh

      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4

      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build -trimpath -o /tmp/bootup ./cmd/bootup
