name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Check scripts
        run: bash -n scripts/build-initramfs.sh scripts/run-qemu.sh

      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4

      - name: Lint fixture build
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4
          args: --build-tags bootup_debian_fixture

      - name: Test
        run: go test -race ./...

      - name: Test fixture build
        run: go test -race -tags bootup_debian_fixture ./...

      - name: Compile VM tests
        run: go test -tags vmtest ./test/vmtest

      - name: Build
        run: go build -trimpath -o /tmp/bootup ./cmd/bootup

      - name: Build fixture binary
        run: go build -trimpath -tags bootup_debian_fixture -o /tmp/bootup-fixture ./cmd/bootup
